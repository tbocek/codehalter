name: build-and-release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.26'

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build codehalter
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o codehalter-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Publish to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          # First job here creates the release; the rest lose the race and get
          # "already exists" (harmless, swallowed). Then each uploads its own
          # asset (distinct names, --clobber so re-runs overwrite) to the one
          # release, so the parallel jobs never collide on creation.
          gh release create "$tag" --title "$tag" --notes "" || true
          # Cover the brief lag before a freshly created release is queryable by tag.
          for _ in 1 2 3 4 5; do gh release view "$tag" >/dev/null 2>&1 && break; sleep 2; done
          gh release upload "$tag" "codehalter-${{ matrix.goos }}-${{ matrix.goarch }}" --clobber