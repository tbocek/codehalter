# Codehalter MCP server registry. Edit and save — codehalter reconciles it at the
# end of every turn: starts/stops/restarts servers and registers their tools live
# (usable on the next prompt, no Zed restart). One [[server]] per server; `name`
# namespaces its tools as <name>__<tool>. Comment a block out to disable it.
#
# Set EITHER the stdio fields (command/args/env) OR the http fields (url/headers).
# Example — uncomment and adapt:
# [[server]]
# name = "fs"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
# # http transport instead of stdio:
# # url = "https://mcp.example.com/v1"
# # headers = { Authorization = "Bearer ..." }
