# Codehalter settings. Edit, then restart the Zed session.
# Machine-wide: move to ~/.config/codehalter/settings.toml (checked first).

[[llm]]
server = "http://localhost:8080"  # host root only, no path
# api_key = "..."                 # if your server needs bearer auth
model = "your-model-id"           # must match /v1/models
parallel = 1                      # max concurrent calls to this server
# context_size = 128000           # required for non-llama.cpp backends
# image_support = true            # for non-llama.cpp vision models
params_thinking = { temperature = 1.0, top_p = 0.95, top_k = 20, min_p = 0.0, presence_penalty = 0.0, max_tokens = 16384 }
params_execute = { temperature = 0.6, top_p = 0.95, top_k = 20, min_p = 0.0, presence_penalty = 0.0, max_tokens = 8192, chat_template_kwargs = { enable_thinking = false } }

